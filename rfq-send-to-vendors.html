
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Send RFQ to Vendors</title>
<script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f7fa;
    padding: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  h3 {
    font-size: 14px;
    font-weight: 600;
    color: #1a202c;
    padding: 10px 14px;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h3 span { font-size: 11px; color: #718096; font-weight: 400; margin-left: auto; }
  .vendor-list {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
  }
  .vendor-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid #f0f4f8;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .vendor-row:last-child { border-bottom: none; }
  .vendor-row:hover { background: #f7f9fc; }
  .vendor-row.selected { background: #ebf4ff; }
  .cb {
    width: 18px; height: 18px;
    border: 2px solid #cbd5e0;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    color: transparent;
    transition: all 0.1s;
  }
  .vendor-row.selected .cb {
    background: #3b82f6;
    border-color: #3b82f6;
    color: white;
  }
  .av {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #dbeafe;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #2563eb;
    flex-shrink: 0;
  }
  .vname { font-size: 13px; font-weight: 500; color: #1a202c; }
  .vemail { font-size: 11px; color: #718096; margin-top: 1px; }
  .loading { padding: 24px; text-align: center; color: #a0aec0; font-size: 13px; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid #e2e8f0;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    display: flex; gap: 8px;
  }
  .btn {
    flex: 1; padding: 11px;
    border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-cancel { background: #edf2f7; color: #718096; }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-send { background: #3b82f6; color: white; }
  .btn-send:hover:not(:disabled) { background: #2563eb; }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  /* Result screen */
  .result {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px 16px;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    text-align: center;
    flex: 1;
  }
  .result.show { display: flex; }
  .result-icon { font-size: 40px; }
  .result-title { font-size: 15px; font-weight: 600; color: #1a202c; }
  .result-sub { font-size: 12px; color: #718096; line-height: 1.6; }
  .result-items { width: 100%; display: flex; flex-direction: column; gap: 4px; }
  .ri {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; background: #f7f9fc;
    border-radius: 6px; font-size: 12px; color: #4a5568;
    border-left: 3px solid #48bb78;
  }
  .ri.fail { border-left-color: #f56565; }
  /* Progress screen */
  .progress {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px 16px;
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    text-align: center;
    flex: 1;
  }
  .progress.show { display: flex; }
  .progress-title { font-size: 14px; font-weight: 600; color: #1a202c; }
  .progress-sub { font-size: 12px; color: #718096; }
  .pbar-wrap { width: 100%; max-width: 260px; height: 4px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  .pbar { height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.3s; width: 0%; }
</style>
</head>
<body>

<h3>📋 Select Vendors <span id="countLabel">0 selected</span></h3>

<div class="vendor-list" id="vendorList">
  <div class="loading"><div class="spinner"></div>Loading vendors...</div>
</div>

<div class="progress" id="progressScreen">
  <div class="spinner"></div>
  <div class="progress-title" id="progTitle">Creating records...</div>
  <div class="progress-sub" id="progSub"></div>
  <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
</div>

<div class="result" id="resultScreen">
  <div class="result-icon" id="resIcon">🎉</div>
  <div class="result-title" id="resTitle"></div>
  <div class="result-sub" id="resSub"></div>
  <div class="result-items" id="resItems"></div>
</div>

<div class="footer" id="footer">
  <button class="btn btn-cancel" onclick="cancel()">Cancel</button>
  <button class="btn btn-send" id="sendBtn" onclick="send()" disabled>✉️ Send RFQ</button>
</div>

<script>
var rfqId = null;
var rfqName = '';
var lineItems = [];
var allVendors = [];
var selected = new Set();

ZOHO.embeddedApp.on("PageLoad", function(data) {
  console.log("PageLoad:", JSON.stringify(data));
  rfqId = data.EntityId;
  if (Array.isArray(rfqId)) rfqId = rfqId[0];
  rfqId = String(rfqId);

  // Load RFQ name + line items + vendors
  loadData();
});
ZOHO.embeddedApp.init();

async function loadData() {
  // 1. Get RFQ record — Line_Items array is returned directly inside getRecord response
  try {
    var r = await ZOHO.CRM.API.getRecord({ Entity: "RFQs", RecordID: rfqId });
    var rec = r && r.data && r.data[0];
    if (rec) {
      rfqName = rec.Name || rfqId;

      // Line_Items is an array inside the RFQ record itself
      var rawItems = rec.Line_Items || [];
      console.log("Line_Items from getRecord:", JSON.stringify(rawItems));

      lineItems = [];
      for (var i = 0; i < rawItems.length; i++) {
        var p = rawItems[i].Line_Items || {};
        if (!p.id) continue;
        var unitPrice = 0;
        try {
          var pr = await ZOHO.CRM.API.getRecord({ Entity: "Products", RecordID: p.id });
          if (pr && pr.data && pr.data[0]) unitPrice = pr.data[0].Unit_Price || 0;
        } catch(pe) {}
        lineItems.push({ productId: p.id, productName: p.name || 'Product', unitPrice: unitPrice });
      }

      // If RFQ has more than 10 items ($has_more), fetch rest via getRelatedRecords
      if (rec.$has_more && rec.$has_more.Line_Items) {
        try {
          var more = await ZOHO.CRM.API.getRelatedRecords({
            Entity: "RFQs", RecordID: rfqId, RelatedList: "RFQ_List", page: 1, per_page: 200
          });
          var moreData = (more && more.data) ? more.data : [];
          var existingIds = new Set(lineItems.map(function(x) { return x.productId; }));
          for (var j = 0; j < moreData.length; j++) {
            var mp = moreData[j].Line_Items || {};
            if (!mp.id || existingIds.has(mp.id)) continue;
            var mPrice = 0;
            try {
              var mpr = await ZOHO.CRM.API.getRecord({ Entity: "Products", RecordID: mp.id });
              if (mpr && mpr.data && mpr.data[0]) mPrice = mpr.data[0].Unit_Price || 0;
            } catch(me) {}
            lineItems.push({ productId: mp.id, productName: mp.name || 'Product', unitPrice: mPrice });
          }
        } catch(re) { console.warn("getRelatedRecords fallback error:", re); }
      }
    } else {
      rfqName = rfqId;
    }
  } catch(e) {
    console.warn("getRecord RFQ error:", e);
    rfqName = rfqId;
    lineItems = [];
  }

  // 2. Get vendors using searchRecord — confirmed working in widget SDK
  try {
    var vRes = await ZOHO.CRM.API.searchRecord({
      Entity: "Vendors",
      Type: "criteria",
      Query: "(id:greater_than:0)"
    });
    console.log("Vendors:", JSON.stringify(vRes));
    allVendors = (vRes && vRes.data) ? vRes.data : [];
    if (!allVendors.length) throw new Error("empty");
  } catch(e1) {
    console.warn("Vendors criteria failed, trying word search:", e1);
    try {
      var vRes2 = await ZOHO.CRM.API.searchRecord({ Entity: "Vendors", Type: "word", Query: "a" });
      allVendors = (vRes2 && vRes2.data) ? vRes2.data : [];
    } catch(e2) {
      console.warn("Vendors word search also failed:", e2);
      allVendors = [];
    }
  }

  renderVendors();
}

function renderVendors() {
  var el = document.getElementById('vendorList');
  if (!allVendors.length) {
    el.innerHTML = '<div class="loading">⚠️ No vendors found in CRM</div>';
    return;
  }
  el.innerHTML = allVendors.map(function(v) {
    var name = v.Vendor_Name || v.Name || 'Vendor';
    var email = v.Email || '';
    var init = name.substring(0, 2).toUpperCase();
    var sel = selected.has(v.id) ? 'selected' : '';
    return '<div class="vendor-row ' + sel + '" onclick="toggle(\'' + v.id + '\')">' +
      '<div class="cb">' + (selected.has(v.id) ? '✓' : '') + '</div>' +
      '<div class="av">' + init + '</div>' +
      '<div><div class="vname">' + esc(name) + '</div>' +
      (email ? '<div class="vemail">' + esc(email) + '</div>' : '') +
      '</div></div>';
  }).join('');
}

function toggle(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  var n = selected.size;
  document.getElementById('countLabel').textContent = n + ' selected';
  document.getElementById('sendBtn').disabled = (n === 0);
  renderVendors();
}

function cancel() {
  try { ZOHO.CRM.UI.Popup.close(); } catch(e) {}
}

async function send() {
  var vendors = allVendors.filter(function(v) { return selected.has(v.id); });
  if (!vendors.length) return;

  // Hide main UI, show progress
  document.getElementById('vendorList').style.display = 'none';
  document.getElementById('footer').style.display = 'none';
  document.querySelector('h3').style.display = 'none';
  document.getElementById('progressScreen').classList.add('show');

  var results = [];
  var total = vendors.length;

  // Build subform items with Expected_Price from unit price
  var subformItems = lineItems.map(function(item) {
    var s = { Item: { id: item.productId } };
    if (item.unitPrice) s.Expected_Price = item.unitPrice;
    return s;
  });

  for (var i = 0; i < vendors.length; i++) {
    var v = vendors[i];
    var vName = v.Vendor_Name || v.Name || 'Vendor';

    document.getElementById('progTitle').textContent = 'Creating ' + (i + 1) + ' of ' + total + '...';
    document.getElementById('progSub').textContent = vName;
    document.getElementById('pbar').style.width = Math.round((i / total) * 100) + '%';

    try {
      var rec = {
        Name: rfqName + ' - ' + vName,
        Vendor: { id: v.id },
        Related_RFQ: { id: rfqId }
      };
      if (subformItems.length > 0) {
        rec.Requested_Items = subformItems;
      }

      console.log("Creating:", JSON.stringify(rec));
      var res = await ZOHO.CRM.API.insertRecord({
        Entity: "Requested_For_Quotations",
        APIData: rec,
        Trigger: []
      });
      console.log("Result:", JSON.stringify(res));

      var ok = res && res.data && res.data[0] && res.data[0].code === 'SUCCESS';
      results.push({ name: vName, ok: ok, msg: ok ? '' : ((res && res.data && res.data[0] && res.data[0].message) || 'Failed') });
    } catch(e) {
      results.push({ name: vName, ok: false, msg: String(e.message || e).substring(0, 60) });
    }
  }

  document.getElementById('pbar').style.width = '100%';

  // Show result
  var okCount = results.filter(function(r) { return r.ok; }).length;
  var failCount = results.filter(function(r) { return !r.ok; }).length;

  document.getElementById('progressScreen').classList.remove('show');
  var rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  document.getElementById('resIcon').textContent = failCount === 0 ? '🎉' : (okCount > 0 ? '⚠️' : '❌');
  document.getElementById('resTitle').textContent = failCount === 0
    ? okCount + ' RFQ(s) Created!'
    : okCount + ' Created, ' + failCount + ' Failed';
  document.getElementById('resSub').textContent = 'Requested For Quotation records have been created.';
  document.getElementById('resItems').innerHTML = results.map(function(r) {
    return '<div class="ri ' + (r.ok ? '' : 'fail') + '">' + (r.ok ? '✅' : '❌') + ' ' + esc(r.name) + (r.msg ? ' — ' + esc(r.msg) : '') + '</div>';
  }).join('');

  // Show close button
  document.getElementById('footer').style.display = 'flex';
  document.getElementById('sendBtn').style.display = 'none';
  document.getElementById('footer').querySelector('.btn-cancel').textContent = 'Close';

  if (okCount > 0) {
    setTimeout(function() { try { ZOHO.CRM.UI.Record.reload(); } catch(e) {} }, 1000);
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
