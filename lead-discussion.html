
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lead Discussion</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa;color:#1a1f36;font-size:13px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;color:#94a3b8}
.loader{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wrap{padding:12px;display:flex;flex-direction:column;gap:8px;max-width:700px;margin:0 auto}
.lead-header{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.lead-info{display:flex;align-items:center;gap:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:#eff6ff;color:#185FA5;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lead-name{font-size:14px;font-weight:600;color:#1a1f36}
.lead-meta{font-size:11px;color:#64748b;margin-top:2px}
.status-select{border:0.5px solid #e2e8f0;border-radius:8px;padding:6px 8px;font-size:12px;font-family:inherit;color:#1a1f36;background:#f8fafc;outline:none;cursor:pointer;max-width:160px}
.acc{background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;overflow:hidden}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none}
.acc-hdr:hover{background:#fafbfc}
.acc-ttl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#1a1f36}
.acc-tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px}
.tag-ro{background:#f1f5f9;color:#475569}
.tag-edit{background:#eff6ff;color:#185FA5}
.tag-green{background:#dcfce7;color:#15803d}
.tag-amber{background:#fef3c7;color:#b45309}
.acc-arrow{width:14px;height:14px;color:#94a3b8;transition:transform .2s;flex-shrink:0}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .2s ease}
.acc-body.open{padding:0 14px 12px;max-height:1800px}
.ro-content{font-size:12px;color:#374151;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.ro-empty{font-size:12px;color:#94a3b8;font-style:italic}
.note-item{padding:7px 0;border-bottom:0.5px solid #f1f5f9}
.note-item:last-child{border-bottom:none}
.note-date{font-size:10px;color:#94a3b8;margin-bottom:2px}
.note-txt{font-size:12px;color:#374151;line-height:1.5;white-space:pre-wrap}
.today-pfx{background:#eff6ff;border:0.5px solid #bfdbfe;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600;color:#185FA5}
.disc-in{width:100%;border:0.5px solid #e2e8f0;border-radius:8px;padding:9px 11px;font-size:13px;font-family:inherit;color:#1a1f36;background:#fff;outline:none;resize:vertical;min-height:75px;line-height:1.6}
.disc-in:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.09)}
.disc-ft{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:5px}
.char-ct{font-size:11px;color:#94a3b8}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-p{background:#3b82f6;color:#fff}.btn-p:hover:not(:disabled){background:#2563eb}
.btn-g{background:#16a34a;color:#fff}.btn-g:hover:not(:disabled){background:#15803d}
.btn-p:disabled,.btn-g:disabled{opacity:.5;cursor:not-allowed}
.btn-gh{background:none;border:0.5px solid #e2e8f0;color:#64748b;padding:6px 12px}
.btn-gh:hover{background:#f1f5f9}
.sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn-p.ld .sp,.btn-g.ld .sp{display:block}
.btn-p.ld .lb,.btn-g.ld .lb{display:none}
.act-list{display:flex;flex-direction:column;gap:7px}
.act-empty{font-size:12px;color:#94a3b8;font-style:italic}
.act-item{border-radius:8px;border:0.5px solid #e2e8f0;background:#f8fafc;overflow:hidden;transition:opacity .3s}
.act-item.overdue{border-left:3px solid #ef4444}
.act-item.today{border-left:3px solid #f59e0b}
.act-item.upcoming{border-left:3px solid #3b82f6}
.act-main{display:flex;align-items:stretch}
.act-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;padding:9px 11px}
.act-right{width:190px;flex-shrink:0;border-left:1px solid #e2e8f0;padding:8px 10px;display:flex;align-items:center}
.act-chk{width:20px;height:20px;border-radius:50%;border:2px solid #16a34a;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.act-chk:hover{background:#dcfce7}
.act-chk.on{background:#16a34a;border-color:#16a34a}
.act-chk svg{opacity:0}.act-chk.on svg{opacity:1}
.act-info{flex:1;min-width:0}
.act-subj{font-size:12px;font-weight:600;color:#1a1f36}
.act-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.act-own{font-size:11px;color:#64748b}
.act-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.act-badge.overdue{background:#fee2e2;color:#dc2626}
.act-badge.today{background:#fef3c7;color:#b45309}
.act-badge.upcoming{background:#dbeafe;color:#1d4ed8}
.act-badge.no-date{background:#f1f5f9;color:#64748b}
.act-desc{font-size:11px;color:#64748b;line-height:1.4;word-break:break-word;overflow-y:auto;max-height:48px;width:100%}
.act-desc-empty{font-size:11px;color:#cbd5e1;font-style:italic}
.act-panel{display:none;padding:9px 11px;border-top:0.5px solid #e2e8f0;background:#f0fdf4;flex-direction:column;gap:7px}
.act-panel.open{display:flex}
.act-panel-lbl{font-size:11px;font-weight:600;color:#15803d}
.act-panel-note{width:100%;border:0.5px solid #bbf7d0;border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;color:#1a1f36;background:#fff;outline:none;resize:none;height:56px;line-height:1.5}
.act-panel-note:focus{border-color:#16a34a}
.act-panel-btns{display:flex;justify-content:flex-end;gap:7px}
.act-cancel{padding:5px 11px;background:#fff;border:0.5px solid #e2e8f0;border-radius:6px;font-size:11px;font-weight:600;color:#64748b;cursor:pointer;font-family:inherit}
.act-done{padding:5px 13px;background:#16a34a;border:none;border-radius:6px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.act-done:hover:not(:disabled){background:#15803d}
.act-done:disabled{opacity:.5;cursor:not-allowed}
.act-done-sp{width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.act-done.ld .act-done-sp{display:block}
.act-done.ld .act-done-lb{display:none}
.tabs{display:flex;gap:6px;margin-bottom:10px}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:0.5px solid #e2e8f0;background:#f8fafc;color:#64748b}
.tab.on{background:#1a1f36;color:#fff;border-color:#1a1f36}
.frm{display:none;flex-direction:column;gap:9px}
.frm.show{display:flex}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fld{display:flex;flex-direction:column;gap:3px}
.flbl{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.fin,.fsel,.fta{width:100%;border:0.5px solid #e2e8f0;border-radius:7px;padding:6px 9px;font-size:12px;font-family:inherit;color:#1a1f36;background:#fff;outline:none}
.fin:focus,.fsel:focus,.fta:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.08)}
.fsel{cursor:pointer}.fta{resize:vertical;min-height:58px;line-height:1.5}
.frm-ft{display:flex;justify-content:flex-end;gap:7px;padding-top:2px}
.toast{position:fixed;bottom:12px;left:50%;transform:translateX(-50%) translateY(60px);border-radius:8px;padding:8px 15px;font-size:12px;font-weight:500;z-index:999;transition:transform .2s,opacity .2s;opacity:0;color:#fff;pointer-events:none;max-width:90%}
.toast.ok{background:#15803d}.toast.er{background:#dc2626}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="loading" id="LS"><div class="loader"></div><span id="LST">Loading...</span></div>
<div class="wrap" id="MW" style="display:none">
  <div class="lead-header">
    <div class="lead-info">
      <div class="avatar" id="AV">?</div>
      <div><div class="lead-name" id="LN">-</div><div class="lead-meta" id="LM"></div></div>
    </div>
    <select class="status-select" id="SS">
      <option value="">-None-</option>
      <option value="New">New</option>
      <option value="Contact in Future">Contact in Future</option>
      <option value="Contacted">Contacted</option>
      <option value="Junk Lead">Junk Lead</option>
      <option value="Future Prospect">Future Prospect</option>
      <option value="Not Contacted">Not Contacted</option>
      <option value="Discovery Call">Discovery Call</option>
      <option value="Not Interested">Not Interested</option>
      <option value="Not Qualified">Not Qualified</option>
    </select>
  </div>
  <div class="acc"><div class="acc-hdr" onclick="tog('req')"><div class="acc-ttl">Requirement Details <span class="acc-tag tag-ro">Read Only</span></div><svg class="acc-arrow" id="ar-req" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="acc-body" id="bd-req"><div id="RC" class="ro-empty">No requirement details.</div></div></div>
  <div class="acc"><div class="acc-hdr" onclick="tog('notes')"><div class="acc-ttl">Notes <span class="acc-tag tag-ro">Read Only</span><span id="NB" style="display:none;background:#f1f5f9;color:#475569;font-size:10px;padding:1px 5px;border-radius:20px;font-weight:600;margin-left:4px"></span></div><svg class="acc-arrow" id="ar-notes" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="acc-body" id="bd-notes"><div id="NC" class="ro-empty">Loading...</div></div></div>
  <div class="acc"><div class="acc-hdr" onclick="tog('desc')"><div class="acc-ttl">Description <span class="acc-tag tag-ro">Read Only</span></div><svg class="acc-arrow" id="ar-desc" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="acc-body" id="bd-desc"><div id="DC" class="ro-empty">No description.</div></div></div>
  <div class="acc">
    <div class="acc-hdr" onclick="tog('today')"><div class="acc-ttl">Today's Discussion <span class="acc-tag tag-edit">Edit</span></div><svg class="acc-arrow open" id="ar-today" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="acc-body open" id="bd-today">
      <div style="margin-bottom:7px"><span class="today-pfx" id="TP">-</span> <span style="font-size:11px;color:#64748b">Type your notes below</span></div>
      <textarea class="disc-in" id="DI" placeholder="Enter today's discussion, next steps, or important notes..." oninput="onInp()"></textarea>
      <div class="disc-ft">
        <span class="char-ct" id="CC">0 characters</span>
        <div style="display:flex;gap:7px">
          <button class="btn btn-gh" onclick="clrDisc()">Clear</button>
          <button class="btn btn-p" id="SB" onclick="saveDisc()"><div class="sp"></div><span class="lb">Save Changes</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="acc">
    <div class="acc-hdr" onclick="tog('acts')"><div class="acc-ttl">Open Activities <span id="AB" class="acc-tag tag-amber" style="display:none">0</span></div><svg class="acc-arrow" id="ar-acts" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="acc-body" id="bd-acts"><div class="act-list" id="AL"><div class="act-empty">Loading...</div></div></div>
  </div>
  <div class="acc">
    <div class="acc-hdr" onclick="tog('create')"><div class="acc-ttl">Create Activity <span class="acc-tag tag-green">New</span></div><svg class="acc-arrow" id="ar-create" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="acc-body" id="bd-create">
      <div class="tabs"><div class="tab on" id="tb-task" onclick="swTab('task')">Task</div><div class="tab" id="tb-call" onclick="swTab('call')">Call</div></div>
      <div class="frm show" id="frm-task">
        <div class="row2">
          <div class="fld">
            <label class="flbl">Subject *</label>
            <select class="fsel" id="tSP" onchange="onSP()"><option value="">Select or type below...</option><option value="Follow-up">Follow-up</option><option value="Call Back Later">Call Back Later</option><option value="Schedule Discovery Call">Schedule Discovery Call</option><option value="Demo Needed">Demo Needed</option></select>
            <input type="text" class="fin" id="tS" placeholder="Or type custom subject..." style="margin-top:5px"/>
          </div>
          <div class="fld"><label class="flbl">Due Date *</label><input type="date" class="fin" id="tD"/></div>
        </div>
        <div class="row2">
          <div class="fld"><label class="flbl">Status</label><select class="fsel" id="tST"><option value="Not Started">Not Started</option><option value="In Progress">In Progress</option><option value="Deferred">Deferred</option><option value="Waiting on someone else">Waiting for input</option></select></div>
          <div class="fld"><label class="flbl">Priority</label><select class="fsel" id="tPR"><option value="Normal">Normal</option><option value="High">High</option><option value="Highest">Highest</option><option value="Low">Low</option></select></div>
        </div>
        <div class="fld"><label class="flbl">Task Owner</label><select class="fsel" id="tOW"><option value="">-- Assign to me --</option></select></div>
        <div class="fld"><label class="flbl">Description</label><textarea class="fta" id="tDE" placeholder="Add task notes..."></textarea></div>
        <div class="frm-ft"><button class="btn btn-gh" onclick="clrFrm('task')">Clear</button><button class="btn btn-g" id="tBtn" onclick="mkTask()"><div class="sp"></div><span class="lb">Add Task</span></button></div>
      </div>
      <div class="frm" id="frm-call">
        <div class="row2">
          <div class="fld"><label class="flbl">Subject *</label><select class="fsel" id="cS"><option value="">Select...</option><option value="Introduction Call">Introduction Call</option><option value="Follow-up Call">Follow-up Call</option><option value="Demo Call">Demo Call</option><option value="Support Call">Support Call</option><option value="Outbound Call">Outbound Call</option><option value="Inbound Call">Inbound Call</option></select></div>
          <div class="fld"><label class="flbl">Call Date &amp; Time</label><input type="datetime-local" class="fin" id="cDT"/></div>
        </div>
        <div class="row2">
          <div class="fld"><label class="flbl">Direction</label><select class="fsel" id="cDR"><option value="Outbound">Outbound</option><option value="Inbound">Inbound</option></select></div>
          <div class="fld"><label class="flbl">Duration (mins)</label><input type="number" class="fin" id="cDU" placeholder="e.g. 10" min="1"/></div>
        </div>
        <div class="fld"><label class="flbl">Call Notes</label><textarea class="fta" id="cDE" placeholder="What was discussed?"></textarea></div>
        <div class="frm-ft"><button class="btn btn-gh" onclick="clrFrm('call')">Clear</button><button class="btn btn-g" id="cBtn" onclick="mkCall()"><div class="sp"></div><span class="lb">Log Call</span></button></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://live.zwidgets.com/js-sdk/1.0/ZohoEmbededAppSDK.min.js"></script>
<script>
var lid=null,ld=null,acts=[],acc={today:true},ts='';

// Safe string helper - strips all HTML, returns plain text only
function safe(v){
  if(v===null||v===undefined)return '';
  var s=String(v);
  // Remove all HTML tags and decode entities
  var t=s;
  t=t.replace(/<[^>]+>/g,'');
  t=t.replace(/&amp;/gi,'&');
  t=t.replace(/&lt;/gi,'<');
  t=t.replace(/&gt;/gi,'>');
  t=t.replace(/&nbsp;/gi,' ');
  t=t.replace(/&quot;/gi,'"');
  return t.trim();
}

// Escape for HTML display
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Strip HTML from note content for clean display
function stripHtml(h){
  if(!h)return '';
  var t=h;
  t=t.replace(/<br[^>]*>/gi,'\n');
  t=t.replace(/<[/]p>/gi,'\n');
  t=t.replace(/<[/]li>/gi,'\n');
  t=t.replace(/<[/]div>/gi,'\n');
  t=t.replace(/<li[^>]*>/gi,'- ');
  t=t.replace(/<[^>]+>/g,'');
  t=t.replace(/&nbsp;/gi,' ');
  t=t.replace(/&amp;/gi,'&');
  t=t.replace(/&lt;/gi,'<');
  t=t.replace(/&gt;/gi,'>');
  t=t.replace(/&quot;/gi,'"');
  t=t.replace(/\n\n\n+/g,'\n\n');
  return t.trim();
}

function em(e){
  if(!e)return 'Error';
  if(typeof e==='string')return e.substring(0,80);
  if(e.message)return String(e.message).substring(0,80);
  try{return JSON.stringify(e).substring(0,80);}catch(x){return 'Error';}
}

function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m;
  el.className='toast '+(t||'ok')+' show';
  setTimeout(function(){el.className='toast';},3500);
}

function fd(d){
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var n=d.getDate();
  var s=n===1||n===21||n===31?'st':n===2||n===22?'nd':n===3||n===23?'rd':'th';
  return n+s+' '+M[d.getMonth()]+' '+d.getFullYear();
}

function fdu(ds){
  if(!ds)return 'No due date';
  var d=new Date(ds);
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();
}

function dst(ds){
  if(!ds)return 'no-date';
  var due=new Date(ds),now=new Date();
  var s=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  return due<s?'overdue':due<new Date(s.getTime()+86400000)?'today':'upcoming';
}

function showUI(){
  document.getElementById('LS').style.display='none';
  document.getElementById('MW').style.display='flex';
}

function tog(k){
  acc[k]=!acc[k];
  var b=document.getElementById('bd-'+k),a=document.getElementById('ar-'+k);
  if(acc[k]){b.classList.add('open');a.classList.add('open');}
  else{b.classList.remove('open');a.classList.remove('open');}
}

// -- INIT  --
ZOHO.embeddedApp.on('PageLoad',function(data){
  try{
    document.getElementById('LST').textContent='Loading lead...';
    var raw=data.EntityId;
    lid=String(Array.isArray(raw)?raw[0]:raw);
    var now=new Date();
    ts=fd(now);
    document.getElementById('TP').textContent=ts+' -';

    // Fire all 4 API calls in parallel for fast load
    var pLead  = ZOHO.CRM.API.getRecord({Entity:'Leads',RecordID:lid});
    var pActs  = ZOHO.CRM.API.getRelatedRecords({Entity:'Leads',RecordID:lid,RelatedList:'Activities',page:1,per_page:50});
    var pNotes = ZOHO.CRM.API.getRelatedRecords({Entity:'Leads',RecordID:lid,RelatedList:'Notes',page:1,per_page:10});
    var pUsers = ZOHO.CRM.API.getUsers({Type:'ActiveUsers'});

    // Show UI as soon as lead loads
    pLead.then(function(r){
      try{
        if(r&&r.data&&r.data[0]){ld=r.data[0];renderLead();}
      }catch(e){console.warn('renderLead err:',e);}
      showUI();
    }).catch(function(e){
      console.warn('getRecord err:',e);
      showUI();
    });

    // Activities - each handler fully isolated
    pActs.then(function(r){
      try{
        var all=(r&&r.data)?r.data:[];
        acts=all.filter(function(t){return (t.Status||'').toLowerCase()!=='completed';});
        renderActs();
      }catch(e){console.warn('acts err:',e);acts=[];renderActs();}
    }).catch(function(){
      // Fallback: search Tasks by What_Id (lead linked via What_Id)
      try{
        ZOHO.CRM.API.searchRecord({Entity:'Tasks',Type:'criteria',Query:'((What_Id:equals:'+lid+')and(Status:not_equal:Completed))'})
          .then(function(r2){try{acts=(r2&&r2.data)?r2.data:[];renderActs();}catch(e){acts=[];renderActs();}})
          .catch(function(){acts=[];renderActs();});
      }catch(e){acts=[];renderActs();}
    });

    // Notes
    pNotes.then(function(r){
      try{
        var notes=(r&&r.data)?r.data:[];
        var el=document.getElementById('NC');
        var badge=document.getElementById('NB');
        if(!notes.length){
          el.innerHTML='<div class="ro-empty">No notes found.</div>';
        }else{
          badge.textContent=notes.length;badge.style.display='inline-block';
          el.innerHTML=notes.map(function(n){
            var dt=n.Created_Time?new Date(n.Created_Time):null;
            var txt=stripHtml(n.Note_Content||n.Content||'');
            return '<div class="note-item">'+(dt?'<div class="note-date">'+esc(fd(dt))+'</div>':'')+'<div class="note-txt">'+esc(txt)+'</div></div>';
          }).join('');
        }
      }catch(e){
        console.warn('notes err:',e);
        document.getElementById('NC').innerHTML='<div class="ro-empty">Could not load notes.</div>';
      }
    }).catch(function(){document.getElementById('NC').innerHTML='<div class="ro-empty">Could not load notes.</div>';});

    // Users for owner dropdown
    pUsers.then(function(r){
      try{
        var u=[];
        if(r&&r.users&&Array.isArray(r.users))u=r.users;
        else if(r&&r.data&&Array.isArray(r.data))u=r.data;
        else if(Array.isArray(r))u=r;
        u=u.filter(function(x){return !x.status||x.status==='active';});
        if(u.length){fillOwners(u);}else{
          ZOHO.CRM.API.getUsers({Type:'AllUsers'}).then(function(r2){
            try{var u2=[];if(r2&&r2.users)u2=r2.users;else if(Array.isArray(r2))u2=r2;fillOwners(u2.filter(function(x){return !x.status||x.status==='active';}));}catch(e){}
          }).catch(function(){});
        }
      }catch(e){console.warn('users err:',e);}
    }).catch(function(){
      try{ZOHO.CRM.API.getUsers({Type:'AllUsers'}).then(function(r){try{var u=[];if(r&&r.users)u=r.users;else if(Array.isArray(r))u=r;fillOwners(u.filter(function(x){return !x.status||x.status==='active';}));}catch(e){}}).catch(function(){});}catch(e){}
    });

  }catch(e){
    console.error('PageLoad error:',e);
    showUI();
  }
});
ZOHO.embeddedApp.init();

// -- RENDER LEAD  --
// Only reads safe plain-text fields. All values sanitized via safe()
function renderLead(){
  var d=ld;
  var fn=safe(d.First_Name);
  var ln=safe(d.Last_Name);
  var full=safe(d.Full_Name);
  // Use Full_Name if available (works even when First_Name is null)
  var name=full||((fn+' '+ln).trim())||'Unknown';
  // Avatar: use first letters of Full_Name words
  var words=name.split(' ').filter(function(w){return w.length>0;});
  var av=words.length>=2?(words[0][0]+words[1][0]).toUpperCase():words.length===1?words[0][0].toUpperCase():'?';
  document.getElementById('AV').textContent=av;
  document.getElementById('LN').textContent=name;
  // Only show safe plain-text contact fields
  var m=[];
  if(d.Mobile)m.push(safe(d.Mobile));
  if(d.Phone)m.push(safe(d.Phone));
  if(d.Email)m.push(safe(d.Email));
  if(d.Company)m.push(safe(d.Company));
  document.getElementById('LM').textContent=m.join(' | ');
  document.getElementById('SS').value=d.Lead_Status||'';
  if(d.Requirement_Details){var r=document.getElementById('RC');r.className='ro-content';r.textContent=safe(d.Requirement_Details);}
  if(d.Description){var dc=document.getElementById('DC');dc.className='ro-content';dc.textContent=safe(d.Description);}
}

// -- OWNER DROPDOWN  --
function fillOwners(u){
  var sel=document.getElementById('tOW');
  sel.innerHTML='<option value="">-- Assign to me --</option>';
  u.forEach(function(x){
    if(!x.id)return;
    var n=safe(x.full_name||x.name||(x.first_name||'')+' '+(x.last_name||'')||x.email||x.id);
    var o=document.createElement('option');o.value=x.id;o.textContent=n;sel.appendChild(o);
  });
}

// -- ACTIVITIES  --
function renderActs(){
  var el=document.getElementById('AL'),badge=document.getElementById('AB');
  if(!acts.length){
    badge.style.display='none';
    el.innerHTML='<div class="act-empty">No open activities found.</div>';return;
  }
  badge.style.display='inline-block';badge.textContent=acts.length;
  if(!acc['acts']){
    acc['acts']=true;
    document.getElementById('bd-acts').classList.add('open');
    document.getElementById('ar-acts').classList.add('open');
  }
  el.innerHTML=acts.map(function(t,i){
    var subj=safe(t.Subject||'Task');
    var due=safe(t.Due_Date||'');
    var st=dst(due);
    var own=t.Owner?safe(t.Owner.name||''):'';
    var desc=stripHtml(t.Description||'');
    var dueTxt=st==='overdue'?'Overdue: '+fdu(due):st==='today'?'Due Today':st==='upcoming'?fdu(due):'No due date';
    return (
      '<div class="act-item '+st+'" id="act-'+i+'">'+
        '<div class="act-main">'+
          '<div class="act-left">'+
            '<div class="act-chk" id="chk-'+i+'" onclick="togP('+i+')" title="Complete">'+
              '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
            '</div>'+
            '<div class="act-info">'+
              '<div class="act-subj">'+esc(subj)+'</div>'+
              '<div class="act-meta">'+
                (own?'<span class="act-own">'+esc(own)+'</span>':'')+
                '<span class="act-badge '+st+'">'+esc(dueTxt)+'</span>'+
              '</div>'+
            '</div>'+
          '</div>'+
          '<div class="act-right">'+
            (desc?'<div class="act-desc">'+esc(desc)+'</div>':'<div class="act-desc-empty">No description</div>')+
          '</div>'+
        '</div>'+
        '<div class="act-panel" id="pan-'+i+'">'+
          '<div class="act-panel-lbl">Add a note before completing (optional)</div>'+
          '<textarea class="act-panel-note" id="note-'+i+'" placeholder="What was done? Next steps..."></textarea>'+
          '<div class="act-panel-btns">'+
            '<button class="act-cancel" onclick="canP('+i+')">Cancel</button>'+
            '<button class="act-done" id="doneBtn-'+i+'" onclick="doneAct('+i+')">'+
              '<div class="act-done-sp"></div><span class="act-done-lb">Mark Complete</span>'+
            '</button>'+
          '</div>'+
        '</div>'+
      '</div>'
    );
  }).join('');
}

function togP(i){
  var p=document.getElementById('pan-'+i),c=document.getElementById('chk-'+i);
  var open=p.classList.contains('open');
  acts.forEach(function(_,j){if(j!==i){var pp=document.getElementById('pan-'+j),cc=document.getElementById('chk-'+j);if(pp)pp.classList.remove('open');if(cc)cc.classList.remove('on');}});
  if(open){p.classList.remove('open');c.classList.remove('on');}
  else{p.classList.add('open');c.classList.add('on');setTimeout(function(){var ta=document.getElementById('note-'+i);if(ta)ta.focus();},120);}
}

function canP(i){
  document.getElementById('pan-'+i).classList.remove('open');
  document.getElementById('chk-'+i).classList.remove('on');
  document.getElementById('note-'+i).value='';
}

function refreshActs(){
  try{
    ZOHO.CRM.API.getRelatedRecords({Entity:'Leads',RecordID:lid,RelatedList:'Activities',page:1,per_page:50})
      .then(function(r){
        try{
          var all=(r&&r.data)?r.data:[];
          acts=all.filter(function(x){return (x.Status||'').toLowerCase()!=='completed';});
          renderActs();
        }catch(e){acts=[];renderActs();}
      }).catch(function(){
        try{
          ZOHO.CRM.API.searchRecord({Entity:'Tasks',Type:'criteria',Query:'((What_Id:equals:'+lid+')and(Status:not_equal:Completed))'})
            .then(function(r2){try{acts=(r2&&r2.data)?r2.data:[];renderActs();}catch(e){acts=[];renderActs();}})
            .catch(function(){acts=[];renderActs();});
        }catch(e){acts=[];renderActs();}
      });
  }catch(e){acts=[];renderActs();}
}

function doneAct(i){
  var t=acts[i];if(!t)return;
  var note=(document.getElementById('note-'+i).value||'').trim();
  var btn=document.getElementById('doneBtn-'+i);
  btn.classList.add('ld');btn.disabled=true;
  var upd={id:t.id,Status:'Completed'};
  if(note){upd.Description=(t.Description?safe(t.Description)+'\n\n':'')+'['+ts+'] '+note;}
  ZOHO.CRM.API.updateRecord({Entity:'Tasks',APIData:upd})
    .then(function(r){
      var ok=r&&r.data&&r.data[0]&&r.data[0].code==='SUCCESS';
      if(!ok){
        var d=r&&r.data&&r.data[0];
        toast('Error: '+(d&&d.message?d.message:JSON.stringify(d||{}).substring(0,60)),'er');
        btn.classList.remove('ld');btn.disabled=false;return;
      }
      // Also append to Lead Description: Date - "Subject" - Note
      if(note){
        try{
          var subj=safe(t.Subject||'Activity');
          var entry=ts+' - "'+subj+'" - '+note;
          var existing=ld&&ld.Description?safe(ld.Description):'';
          var newDesc=existing?existing+'\n'+entry:entry;
          ZOHO.CRM.API.updateRecord({Entity:'Leads',APIData:{id:lid,Description:newDesc}})
            .then(function(r2){
              try{
                if(r2&&r2.data&&r2.data[0]&&r2.data[0].code==='SUCCESS'){
                  if(ld)ld.Description=newDesc;
                  var dc=document.getElementById('DC');
                  if(dc){dc.className='ro-content';dc.textContent=newDesc;}
                }
              }catch(e){}
            }).catch(function(){});
        }catch(e){console.warn('lead desc err:',e);}
      }
      toast('Task completed!','ok');
      var el=document.getElementById('act-'+i);if(el)el.style.opacity='0';
      setTimeout(refreshActs,400);
    }).catch(function(e){toast('Error: '+em(e),'er');btn.classList.remove('ld');btn.disabled=false;});
}

// -- CREATE TASK  --
function onSP(){var v=document.getElementById('tSP').value;if(v)document.getElementById('tS').value=v;}

function mkTask(){
  var subj=document.getElementById('tS').value.trim();
  if(!subj){toast('Please enter or select a Subject','er');document.getElementById('tS').focus();return;}
  var due=document.getElementById('tD').value;
  if(!due){toast('Due Date is mandatory','er');document.getElementById('tD').focus();return;}
  var btn=document.getElementById('tBtn');btn.classList.add('ld');btn.disabled=true;
  var ow=document.getElementById('tOW').value;
  var desc=document.getElementById('tDE').value.trim();
  var data={Subject:subj,Status:document.getElementById('tST').value||'Not Started',Priority:document.getElementById('tPR').value||'Normal',$se_module:'Leads',What_Id:{id:lid},Due_Date:due};
  if(ow)data.Owner={id:ow};
  if(desc)data.Description=desc;
  if(ld){if(ld.Mobile||ld.Phone)data.Lead_Contact_Phone=safe(ld.Mobile||ld.Phone);if(ld.Email)data.Lead_Contact_Email=safe(ld.Email);}
  ZOHO.CRM.API.insertRecord({Entity:'Tasks',APIData:data,Trigger:[]})
    .then(function(r){
      btn.classList.remove('ld');btn.disabled=false;
      var ok=r&&r.data&&r.data[0]&&r.data[0].code==='SUCCESS';
      if(ok){toast('Task created!','ok');clrFrm('task');refreshActs();}
      else{var d=r&&r.data&&r.data[0];toast('Error: '+(d&&d.message?d.message:JSON.stringify(d||{}).substring(0,80)),'er');}
    }).catch(function(e){btn.classList.remove('ld');btn.disabled=false;toast('Error: '+em(e),'er');});
}

// -- CREATE CALL  --
function mkCall(){
  var subj=document.getElementById('cS').value;
  if(!subj){toast('Please select a Subject','er');return;}
  var btn=document.getElementById('cBtn');btn.classList.add('ld');btn.disabled=true;
  var dt=document.getElementById('cDT').value;
  var dur=parseInt(document.getElementById('cDU').value)||0;
  var desc=document.getElementById('cDE').value.trim();
  var data={Subject:subj,Call_Type:document.getElementById('cDR').value||'Outbound',Call_Start_Time:dt?new Date(dt).toISOString():new Date().toISOString(),$se_module:'Leads',What_Id:{id:lid}};
  if(dur>0){var h=Math.floor(dur/60),m=dur%60;data.Call_Duration=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
  if(desc)data.Description=desc;
  ZOHO.CRM.API.insertRecord({Entity:'Calls',APIData:data,Trigger:[]})
    .then(function(r){
      btn.classList.remove('ld');btn.disabled=false;
      var ok=r&&r.data&&r.data[0]&&r.data[0].code==='SUCCESS';
      if(ok){toast('Call logged!','ok');clrFrm('call');}
      else{var d=r&&r.data&&r.data[0];toast('Error: '+(d&&d.message?d.message:JSON.stringify(d||{}).substring(0,80)),'er');}
    }).catch(function(e){btn.classList.remove('ld');btn.disabled=false;toast('Error: '+em(e),'er');});
}

// -- SAVE DISCUSSION  --
function onInp(){var v=document.getElementById('DI').value;document.getElementById('CC').textContent=v.length+' character'+(v.length!==1?'s':'');}
function clrDisc(){document.getElementById('DI').value='';onInp();}

function saveDisc(){
  var disc=document.getElementById('DI').value.trim();
  var stat=document.getElementById('SS').value;
  if(!disc){toast("Please enter today's notes",'er');document.getElementById('DI').focus();return;}
  var btn=document.getElementById('SB');btn.classList.add('ld');btn.disabled=true;
  var ex=ld&&ld.Description?safe(ld.Description):'';
  var nd=ex?ex+'\n'+ts+' - '+disc:ts+' - '+disc;
  var p={id:lid,Description:nd};if(stat)p.Lead_Status=stat;
  ZOHO.CRM.API.updateRecord({Entity:'Leads',APIData:p})
    .then(function(r){
      btn.classList.remove('ld');btn.disabled=false;
      if(r&&r.data&&r.data[0]&&r.data[0].code==='SUCCESS'){
        if(ld){ld.Description=nd;if(stat)ld.Lead_Status=stat;}
        var el=document.getElementById('DC');el.className='ro-content';el.textContent=nd;
        clrDisc();toast('Saved!','ok');
        setTimeout(function(){try{ZOHO.CRM.UI.Popup.closeReload();}catch(e){}},1500);
      }else{toast('Save failed.','er');}
    }).catch(function(){btn.classList.remove('ld');btn.disabled=false;toast('Error saving.','er');});
}

// -- HELPERS  --
function swTab(t){
  ['task','call'].forEach(function(k){
    document.getElementById('tb-'+k).className='tab'+(k===t?' on':'');
    document.getElementById('frm-'+k).className='frm'+(k===t?' show':'');
  });
}

function clrFrm(t){
  if(t==='task'){
    document.getElementById('tSP').value='';document.getElementById('tS').value='';
    document.getElementById('tD').value='';document.getElementById('tST').value='Not Started';
    document.getElementById('tPR').value='Normal';document.getElementById('tOW').value='';
    document.getElementById('tDE').value='';
  }else{
    document.getElementById('cS').value='';document.getElementById('cDT').value='';
    document.getElementById('cDR').value='Outbound';document.getElementById('cDU').value='';
    document.getElementById('cDE').value='';
  }
}
