
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lead Discussion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a1f36;font-size:13px;min-height:100vh}

/* ── LAYOUT ── */
.main-layout{display:flex;flex-direction:column;height:100vh;gap:0}
.left-panel{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:#f5f7fa;flex:1}
.right-panel{display:none}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;color:#94a3b8}
.loader-spin{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LEAD HEADER ── */
.lead-header{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.lead-info{display:flex;align-items:center;gap:11px}
.avatar{width:36px;height:36px;border-radius:50%;background:#eff6ff;color:#185FA5;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lead-name{font-size:14px;font-weight:600;color:#1a1f36}
.lead-meta{font-size:11px;color:#64748b;margin-top:2px}
.status-select{border:0.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:12px;font-family:inherit;color:#1a1f36;background:#f8fafc;outline:none;cursor:pointer;max-width:160px}
.status-select:focus{border-color:#3b82f6}

/* ── ACCORDIONS ── */
.accordion{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;overflow:hidden}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;user-select:none;transition:background .15s}
.acc-header:hover{background:#fafbfc}
.acc-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#1a1f36}
.acc-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.tag-ro{background:#f1f5f9;color:#475569}
.tag-edit{background:#eff6ff;color:#185FA5}
.acc-arrow{width:15px;height:15px;color:#94a3b8;transition:transform .2s;flex-shrink:0}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{padding:0 15px;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .25s ease}
.acc-body.open{padding:0 15px 13px;max-height:600px}
.readonly-content{font-size:12px;color:#374151;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.readonly-empty{font-size:12px;color:#94a3b8;font-style:italic}
.note-item{padding:8px 0;border-bottom:0.5px solid #f1f5f9}
.note-item:last-child{border-bottom:none}
.note-date{font-size:11px;color:#94a3b8;margin-bottom:3px}
.note-text{font-size:12px;color:#374151;line-height:1.5}

/* ── TODAY'S DISCUSSION ── */
.today-prefix{background:#eff6ff;border:0.5px solid #bfdbfe;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;color:#185FA5;margin-bottom:8px;display:inline-block}
.discussion-input{width:100%;border:0.5px solid #e2e8f0;border-radius:8px;padding:9px 11px;font-size:12px;font-family:inherit;color:#1a1f36;background:#fff;outline:none;resize:vertical;min-height:90px;transition:border .15s;line-height:1.6}
.discussion-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.discussion-input::placeholder{color:#94a3b8}
.disc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.char-count{font-size:11px;color:#94a3b8}
.save-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:#3b82f6;border:none;border-radius:8px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;transition:all .15s}
.save-btn:hover:not(:disabled){background:#2563eb}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.save-spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.save-btn.loading .save-spin{display:block}
.save-btn.loading .save-lbl{display:none}

/* ── WHATSAPP PANEL (RIGHT) ── */

.sent .delivered .read 

30%{transform:translateY(-4px)}}

/* FILE MESSAGES */

/* ── TOAST ── */
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);border-radius:8px;padding:9px 16px;font-size:12px;font-weight:500;z-index:999;transition:transform .25s,opacity .25s;opacity:0;color:#fff;pointer-events:none}
.toast.ok{background:#15803d}.toast.er{background:#dc2626}.toast.info{background:#2563eb}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── SUCCESS OVERLAY ── */
.success-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:99}
.success-overlay.show{display:flex}
.success-icon{width:52px;height:52px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center}
.success-overlay h3{font-size:15px;font-weight:600;color:#15803d}
.success-overlay p{font-size:12px;color:#64748b}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loader-spin"></div>
  <span>Loading lead details...</span>
</div>

<div class="main-layout" id="mainLayout" style="display:none">

  <!-- ══ LEFT: LEAD DISCUSSION ══ -->
  <div class="left-panel">

    <!-- Lead Header -->
    <div class="lead-header">
      <div class="lead-info">
        <div class="avatar" id="ldAvatar">?</div>
        <div>
          <div class="lead-name" id="ldName">Loading...</div>
          <div class="lead-meta" id="ldMeta"></div>
        </div>
      </div>
      <select class="status-select" id="ldStatus">
        <option value="">-None-</option>
        <option value="New">New</option>
        <option value="Contact in Future">Contact in Future</option>
        <option value="Contacted">Contacted</option>
        <option value="Junk Lead">Junk Lead</option>
        <option value="Future Prospect">Future Prospect</option>
        <option value="Not Contacted">Not Contacted</option>
        <option value="Discovery Call">Discovery Call</option>
        <option value="Not Interested">Not Interested</option>
        <option value="Not Qualified">Not Qualified</option>
      </select>
    </div>

    <!-- Requirement Details -->
    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('req')">
        <div class="acc-title">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="#94a3b8" stroke-width="1.2"/><path d="M3.5 4.5h7M3.5 7h7M3.5 9.5h4" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/></svg>
          Requirement Details
          <span class="acc-tag tag-ro">Read Only</span>
        </div>
        <svg class="acc-arrow" id="arrow-req" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="acc-body" id="body-req">
        <div id="reqContent" class="readonly-empty">No requirement details available.</div>
      </div>
    </div>

    <!-- Notes -->
    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('notes')">
        <div class="acc-title">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h10v8l-3 2H2V2z" stroke="#94a3b8" stroke-width="1.2" stroke-linejoin="round"/><path d="M4 5h6M4 7h4" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/></svg>
          Notes
          <span class="acc-tag tag-ro">Read Only</span>
          <span id="notesBadge" style="display:none;background:#f1f5f9;color:#475569;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600"></span>
        </div>
        <svg class="acc-arrow" id="arrow-notes" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="acc-body" id="body-notes">
        <div id="notesContent" class="readonly-empty">No notes found.</div>
      </div>
    </div>

    <!-- Description -->
    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('desc')">
        <div class="acc-title">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3h10M2 6h10M2 9h6" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/></svg>
          Description
          <span class="acc-tag tag-ro">Read Only</span>
        </div>
        <svg class="acc-arrow" id="arrow-desc" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="acc-body" id="body-desc">
        <div id="descContent" class="readonly-empty">No description available.</div>
      </div>
    </div>

    <!-- Today's Discussion -->
    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('today')">
        <div class="acc-title">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v2M7 11v2M1 7h2M11 7h2" stroke="#185FA5" stroke-width="1.2" stroke-linecap="round"/><circle cx="7" cy="7" r="3" stroke="#185FA5" stroke-width="1.2"/></svg>
          Today's Discussion
          <span class="acc-tag tag-edit">Edit</span>
        </div>
        <svg class="acc-arrow open" id="arrow-today" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="acc-body open" id="body-today">
        <span class="today-prefix" id="todayPrefix">12 Apr 2026 -</span>
        <textarea class="discussion-input" id="discussionInput" placeholder="Enter today's discussion details..." oninput="onDiscInput()"></textarea>
        <div class="disc-footer">
          <span class="char-count" id="charCount">0 characters</span>
          <button class="save-btn" id="saveDiscBtn" onclick="saveDiscussion()">
            <div class="save-spin"></div>
            <span class="save-lbl">Save</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Open Activities -->
    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('activities')">
        <div class="acc-title">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="11" rx="1.5" stroke="#f59e0b" stroke-width="1.2"/><path d="M4 1v2M10 1v2M1 5h12" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round"/><path d="M4 8h2M8 8h2M4 10.5h2" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round"/></svg>
          Open Activities
          <span class="acc-tag" id="activitiesBadge" style="background:#fef3c7;color:#b45309;display:none">0</span>
        </div>
        <svg class="acc-arrow" id="arrow-activities" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="acc-body" id="body-activities">
        <div class="act-list" id="activityList">
          <div class="act-loading"><div class="act-spin"></div>Loading activities...</div>
        </div>
      </div>
    </div>

    <!-- Add Task -->
    <div class="accordion">
      <div class="acc-header" onclick="toggleAcc('task')">
        <div class="acc-title">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" stroke="#16a34a" stroke-width="1.2"/><path d="M4.5 7l2 2 3-3" stroke="#16a34a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Add Task
          <span class="acc-tag" style="background:#dcfce7;color:#16a34a">New</span>
        </div>
        <svg class="acc-arrow" id="arrow-task" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="acc-body" id="body-task">
        <div class="task-form">
          <div class="task-row">
            <div class="task-field">
              <label class="task-label">Subject *</label>
              <select class="task-select" id="taskSubject">
                <option value="">Select...</option>
                <option value="Call">Call</option>
                <option value="Email">Email</option>
                <option value="Meeting">Meeting</option>
                <option value="Send Letter">Send Letter</option>
                <option value="Product Demo">Product Demo</option>
              </select>
            </div>
            <div class="task-field">
              <label class="task-label">Due Date</label>
              <input type="date" class="task-input" id="taskDueDate"/>
            </div>
          </div>
          <div class="task-row">
            <div class="task-field">
              <label class="task-label">Status</label>
              <select class="task-select" id="taskStatus">
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Deferred">Deferred</option>
                <option value="Waiting on someone else">Waiting for input</option>
                <option value="Completed">Completed</option>
              </select>
            </div>
            <div class="task-field">
              <label class="task-label">Priority</label>
              <select class="task-select" id="taskPriority">
                <option value="Normal">Normal</option>
                <option value="High">High</option>
                <option value="Highest">Highest</option>
                <option value="Low">Low</option>
                <option value="Lowest">Lowest</option>
              </select>
            </div>
          </div>
          <div class="task-field full">
            <label class="task-label">Description</label>
            <textarea class="task-textarea" id="taskDescription" placeholder="Add task notes or context..."></textarea>
          </div>
          <div class="task-footer">
            <button class="task-clear-btn" onclick="clearTaskForm()">Clear</button>
            <button class="task-save-btn" id="taskSaveBtn" onclick="saveTask()">
              <div class="task-spin"></div>
              <span class="task-save-lbl">✓ Add Task</span>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

<emoji-picker id="emoji-picker" style="position:fixed;display:none;z-index:100"></emoji-picker>

<div class="success-overlay" id="successOverlay">
  <div class="success-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#16a34a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <h3 id="successMsg">Saved!</h3>
  <p id="successSub"></p>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// SHARED STATE
// ════════════════════════════════════════════
var leadId = null;
var leadData = null;
var openAccordions = { today: true };

// Date helpers
function formatDate(d) {
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var day = d.getDate();
  var suffix = day===1||day===21||day===31?'st':day===2||day===22?'nd':day===3||day===23?'rd':'th';
  return day + suffix + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}
var today = new Date();
var todayStr = formatDate(today);
document.getElementById('todayPrefix').textContent = todayStr + ' -';

function getCurrentTime() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes();
  var ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
}

// ════════════════════════════════════════════
// ACCORDION (LEFT PANEL)
// ════════════════════════════════════════════
function toggleAcc(key) {
  openAccordions[key] = !openAccordions[key];
  var body = document.getElementById('body-' + key);
  var arrow = document.getElementById('arrow-' + key);
  if (openAccordions[key]) {
    body.classList.add('open');
    if (arrow) arrow.classList.add('open');
  } else {
    body.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
  }
}

function onDiscInput() {
  var val = document.getElementById('discussionInput').value;
  document.getElementById('charCount').textContent = val.length + ' character' + (val.length !== 1 ? 's' : '');
}

// ════════════════════════════════════════════
// ZOHO SDK INIT
// ════════════════════════════════════════════
ZOHO.embeddedApp.on("PageLoad", async function(data) {
  pageLoadData = data;
  var raw = data.EntityId;
  leadId = String(Array.isArray(raw) ? raw[0] : raw);
  await fetchLeadDetails(data);
  await loadAllMessages(data);
  listofdata = data;
  await fetchTemplates();
  loadTemplates('load');
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainLayout').style.display = 'grid';
  loadOpenActivities();
});
ZOHO.embeddedApp.init();

// ════════════════════════════════════════════
// FETCH LEAD DETAILS
// ════════════════════════════════════════════
async function fetchLeadDetails(data) {
  try {
    var response = await ZOHO.CRM.API.getRecord({ Entity: "Leads", RecordID: leadId });
    var details = response?.data?.[0];
    if (!details) return;
    leadData = details;
    userName = details.Full_Name || details.First_Name || '...';

    // Update left panel header
    var fn = details.First_Name || '';
    var ln = details.Last_Name || '';
    var initials = ((fn[0]||'') + (ln[0]||'')).toUpperCase() || '?';
    var fullName = (fn + ' ' + ln).trim() || 'Unknown Lead';
    document.getElementById('ldAvatar').textContent = initials;
    document.getElementById('ldName').textContent = fullName;
    var meta = [];
    if (details.Phone) meta.push(details.Phone);
    if (details.Mobile) meta.push(details.Mobile);
    if (details.Email) meta.push(details.Email);
    document.getElementById('ldMeta').textContent = meta.join(' · ');
    document.getElementById('ldStatus').value = details.Lead_Status || '';

    // WA Header
    document.getElementById('waAvatar').textContent = initials;
    document.getElementById('waName').textContent = fullName;
    document.getElementById('waSubtitle').textContent = details.Phone || details.Mobile || 'No phone';

    // Requirement Details
    var req = document.getElementById('reqContent');
    if (details.Requirement_Details) { req.className = 'readonly-content'; req.textContent = details.Requirement_Details; }
    else { req.className = 'readonly-empty'; req.textContent = 'No requirement details available.'; }

    // Description
    var desc = document.getElementById('descContent');
    if (details.Description) { desc.className = 'readonly-content'; desc.textContent = details.Description; }
    else { desc.className = 'readonly-empty'; desc.textContent = 'No description available.'; }

    // Check phone for WA
    if (!details.Phone && !details.Mobile) {
      document.getElementById('waFooter').style.display = 'none';
      document.getElementById('waNoPhone').style.display = 'block';
    }

    // Load Notes
    loadNotes();
  } catch(e) {
    console.error("fetchLeadDetails error:", e);
  }
}

function loadNotes() {
  ZOHO.CRM.API.getRelatedRecords({ Entity:"Leads", RecordID:leadId, RelatedList:"Notes", page:1, per_page:10 })
    .then(function(res) {
      var notes = (res && res.data) ? res.data : [];
      var container = document.getElementById('notesContent');
      var badge = document.getElementById('notesBadge');
      if (!notes.length) { container.innerHTML = '<div class="readonly-empty">No notes found.</div>'; return; }
      badge.textContent = notes.length; badge.style.display = '';
      var html = '';
      notes.forEach(function(n) {
        var d = n.Created_Time ? new Date(n.Created_Time) : null;
        html += '<div class="note-item">';
        if (d) html += '<div class="note-date">' + esc(formatDate(d)) + '</div>';
        html += '<div class="note-text">' + esc(n.Note_Content || '') + '</div></div>';
      });
      container.innerHTML = html;
    }).catch(function() {});
}

// ════════════════════════════════════════════
// SAVE DISCUSSION (LEFT PANEL)
// ════════════════════════════════════════════
function saveDiscussion() {
  var discussion = document.getElementById('discussionInput').value.trim();
  var newStatus = document.getElementById('ldStatus').value;
  if (!discussion) { showToast("Please enter today's discussion notes", 'er'); return; }
  var btn = document.getElementById('saveDiscBtn');
  btn.classList.add('loading'); btn.disabled = true;
  var existingDesc = (leadData && leadData.Description) ? leadData.Description : '';
  var newEntry = todayStr + ' - ' + discussion;
  var newDescription = existingDesc ? existingDesc + '\n' + newEntry : newEntry;
  var payload = { id: leadId, Description: newDescription };
  if (newStatus) payload.Lead_Status = newStatus;
  ZOHO.CRM.API.updateRecord({ Entity:'Leads', APIData:payload })
    .then(function(res) {
      btn.classList.remove('loading'); btn.disabled = false;
      if (res && res.data && res.data[0] && res.data[0].code === 'SUCCESS') {
        leadData.Description = newDescription;
        if (newStatus) leadData.Lead_Status = newStatus;
        var desc = document.getElementById('descContent');
        desc.className = 'readonly-content'; desc.textContent = newDescription;
        document.getElementById('discussionInput').value = ''; onDiscInput();
        showToast('Discussion saved!', 'ok');
        // Also add a note
        addNoteToLead('Discussion noted: ' + newEntry);
      } else { showToast('Save failed. Try again.', 'er'); }
    }).catch(function() { btn.classList.remove('loading'); btn.disabled = false; showToast('Error saving.', 'er'); });
}

function addNoteToLead(noteContent) {
  ZOHO.CRM.API.insertRecord({ Entity:'Notes', APIData:{ Note_Title:'Discussion', Note_Content:noteContent, Parent_Id:{ module:'Leads', id:leadId } } })
    .then(function() { loadNotes(); }).catch(function(e) { console.error('Note error:', e); });
}

// ─── TOAST & HELPERS ───
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'ok') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════════
// OPEN ACTIVITIES
// ════════════════════════════════════════════
var openActivities = [];

async function loadOpenActivities() {
  try {
    var res = await ZOHO.CRM.API.searchRecord({
      Entity: 'Tasks',
      Type: 'criteria',
      Query: '((Who_Id:equals:' + leadId + ')and(Status:not_equal:Completed))'
    });
    openActivities = (res && res.data) ? res.data : [];
    renderActivities();
  } catch(e) {
    console.warn('loadOpenActivities error:', e);
    openActivities = [];
    renderActivities();
  }
}

function getActivityDueStatus(dueDateStr) {
  if (!dueDateStr) return 'no-date';
  var due = new Date(dueDateStr);
  var now = new Date();
  var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var todayEnd = new Date(todayStart.getTime() + 86400000);
  if (due < todayStart) return 'overdue';
  if (due < todayEnd) return 'today';
  return 'upcoming';
}

function formatDueDate(dueDateStr) {
  if (!dueDateStr) return 'No due date';
  var d = new Date(dueDateStr);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function renderActivities() {
  var el = document.getElementById('activityList');
  var badge = document.getElementById('activitiesBadge');

  if (!openActivities.length) {
    badge.style.display = 'none';
    el.innerHTML = '<div class="act-empty">No open activities found.</div>';
    return;
  }

  badge.style.display = 'inline-block';
  badge.textContent = openActivities.length;

  // Auto-open accordion if there are activities
  if (!openAccordions['activities']) {
    openAccordions['activities'] = true;
    document.getElementById('body-activities').classList.add('open');
    document.getElementById('arrow-activities').classList.add('open');
  }

  el.innerHTML = openActivities.map(function(task, idx) {
    var subject = task.Subject || task.subject || 'Task';
    var dueDate = task.Due_Date || task.due_date || '';
    var status = getActivityDueStatus(dueDate);
    var dueTxt = formatDueDate(dueDate);
    var dueBadgeTxt = status === 'overdue' ? '⚠ Overdue: ' + dueTxt
                    : status === 'today'   ? '📅 Due Today'
                    : status === 'upcoming'? '🗓 ' + dueTxt
                    :                       '📌 ' + dueTxt;
    return '<div class="act-item ' + status + '" id="act-item-' + idx + '">' +
      '<div class="act-top">' +
        '<span class="act-subject">📋 ' + esc(subject) + '</span>' +
        '<span class="act-due ' + status + '">' + dueBadgeTxt + '</span>' +
      '</div>' +
      '<div class="act-desc-wrap">' +
        '<textarea class="act-desc-input" id="act-desc-' + idx + '" placeholder="Add completion note (optional)..."></textarea>' +
        '<button class="act-complete-btn" id="act-btn-' + idx + '" onclick="completeActivity(' + idx + ')">' +
          '✓ Complete' +
        '</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function completeActivity(idx) {
  var task = openActivities[idx];
  if (!task) return;

  var btn = document.getElementById('act-btn-' + idx);
  var descEl = document.getElementById('act-desc-' + idx);
  var note = descEl ? descEl.value.trim() : '';

  btn.disabled = true;
  btn.textContent = '...';

  try {
    var updateData = { Status: 'Completed' };
    if (note) updateData.Description = (task.Description ? task.Description + '\n\n' : '') + '[' + todayStr + '] ' + note;

    var res = await ZOHO.CRM.API.updateRecord({
      Entity: 'Tasks',
      APIData: { id: task.id, ...updateData },
      Trigger: []
    });

    var ok = res && res.data && res.data[0] && res.data[0].code === 'SUCCESS';
    if (ok) {
      // Remove from list with fade
      var item = document.getElementById('act-item-' + idx);
      if (item) { item.style.opacity = '0'; item.style.transition = 'opacity .3s'; setTimeout(function(){ loadOpenActivities(); }, 300); }
      showToast('Task marked as completed!', 'ok');
    } else {
      var msg = (res && res.data && res.data[0] && res.data[0].message) || 'Update failed';
      showToast('Error: ' + msg, 'er');
      btn.disabled = false;
      btn.textContent = '✓ Complete';
    }
  } catch(e) {
    showToast('Error: ' + (e.message || String(e)), 'er');
    btn.disabled = false;
    btn.textContent = '✓ Complete';
  }
}

// ════════════════════════════════════════════
// ADD TASK
// ════════════════════════════════════════════
function clearTaskForm() {
  document.getElementById('taskSubject').value = '';
  document.getElementById('taskDueDate').value = '';
  document.getElementById('taskStatus').value = 'Not Started';
  document.getElementById('taskPriority').value = 'Normal';
  document.getElementById('taskDescription').value = '';
}

async function saveTask() {
  var subject = document.getElementById('taskSubject').value;
  if (!subject) { showToast('Please select a Subject for the task.', 'er'); return; }

  var btn = document.getElementById('taskSaveBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    var taskData = {
      Subject: subject,
      Status: document.getElementById('taskStatus').value || 'Not Started',
      Priority: document.getElementById('taskPriority').value || 'Normal',
      Who_Id: { id: leadId, module: 'Leads' }
    };

    var dueDate = document.getElementById('taskDueDate').value;
    if (dueDate) taskData.Due_Date = dueDate;

    var desc = document.getElementById('taskDescription').value.trim();
    if (desc) taskData.Description = desc;

    // Auto-populate custom task fields from lead data
    if (leadData) {
      if (leadData.Phone || leadData.Mobile) taskData.Lead_Contact_Phone = leadData.Mobile || leadData.Phone || '';
      if (leadData.Email) taskData.Lead_Contact_Email = leadData.Email || '';
      if (leadData.Description) taskData.Lead_Contact_Description = leadData.Description || '';
      if (leadData.Requirement_Details) taskData.Requirement_Details = leadData.Requirement_Details || '';
    }

    var res = await ZOHO.CRM.API.insertRecord({
      Entity: 'Tasks',
      APIData: taskData,
      Trigger: []
    });

    var ok = res && res.data && res.data[0] && res.data[0].code === 'SUCCESS';
    if (ok) {
      showToast('Task added successfully!', 'ok');
      clearTaskForm();
      toggleAcc('task'); // collapse after save
    } else {
      var msg = (res && res.data && res.data[0] && res.data[0].message) || 'Failed to create task';
      showToast('Error: ' + msg, 'er');
    }
  } catch(e) {
    showToast('Error: ' + (e.message || String(e)), 'er');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// Polling — reload activities after task saved
