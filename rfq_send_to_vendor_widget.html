<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Send RFQ to Vendors</title>
<script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2336;
    --border: #2a2f45;
    --accent: #4f8ef7;
    --accent2: #38d9a9;
    --text: #e8eaf6;
    --text2: #8b92b3;
    --danger: #f4756a;
    --success: #38d9a9;
    --radius: 12px;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-info h2 { font-size: 15px; font-weight: 600; }
  .header-info p { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .rfq-badge {
    margin-left: auto;
    background: rgba(79,142,247,0.15);
    border: 1px solid rgba(79,142,247,0.3);
    color: var(--accent);
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-family: 'DM Mono', monospace;
  }
  .section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .section-header span {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 1px 7px; border-radius: 20px; margin-left: auto;
  }
  .products-list {
    padding: 8px; display: flex; flex-direction: column; gap: 4px;
    max-height: 140px; overflow-y: auto;
  }
  .product-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--surface2); border-radius: 8px; border: 1px solid var(--border);
  }
  .product-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
  .product-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .product-id { font-size: 10px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .search-wrap {
    padding: 10px; border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text2); }
  .search-input:focus { border-color: var(--accent); }
  .select-all-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-bottom: 1px solid var(--border);
  }
  .select-all-btn {
    background: none; border: none; color: var(--accent);
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
  }
  .select-all-btn:hover { background: rgba(79,142,247,0.1); }
  .selected-count { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .vendors-list {
    padding: 8px; display: flex; flex-direction: column; gap: 4px;
    max-height: 220px; overflow-y: auto;
  }
  .vendor-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2); border-radius: 8px; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .vendor-item:hover { border-color: var(--accent); background: rgba(79,142,247,0.05); }
  .vendor-item.selected { border-color: var(--accent); background: rgba(79,142,247,0.1); }
  .vendor-checkbox {
    width: 18px; height: 18px; border-radius: 5px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s; font-size: 11px;
  }
  .vendor-item.selected .vendor-checkbox { background: var(--accent); border-color: var(--accent); color: white; }
  .vendor-avatar {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #2a3560, #1e2845);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--accent);
    flex-shrink: 0; border: 1px solid var(--border);
  }
  .vendor-info { flex: 1; min-width: 0; }
  .vendor-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vendor-email { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .state-msg { padding: 24px; text-align: center; color: var(--text2); font-size: 13px; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    display: flex; gap: 10px; padding: 14px 16px;
    background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  }
  .btn {
    flex: 1; padding: 11px 16px; border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--text2); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #3a7de0); color: white; box-shadow: 0 4px 16px rgba(79,142,247,0.3); }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.4); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15,17,23,0.95); z-index: 100;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 32px;
  }
  .progress-overlay.show { display: flex; }
  .progress-title { font-size: 16px; font-weight: 600; }
  .progress-bar-wrap { width: 100%; max-width: 300px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; width: 0%; }
  .progress-steps { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
  .progress-step {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border); font-size: 13px; color: var(--text2); transition: all 0.2s;
  }
  .progress-step.active { border-color: var(--accent); color: var(--text); }
  .progress-step.done { border-color: var(--success); color: var(--success); }
  .progress-step.error { border-color: var(--danger); color: var(--danger); }
  .result-box { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 24px; text-align: center; }
  .result-box.show { display: flex; }
  .result-icon { font-size: 40px; }
  .result-title { font-size: 16px; font-weight: 600; }
  .result-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .result-list { width: 100%; display: flex; flex-direction: column; gap: 4px; max-height: 140px; overflow-y: auto; }
  .result-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--surface2); border-radius: 6px; font-size: 12px; color: var(--text2); text-align: left; }
  .result-item.ok { border-left: 2px solid var(--success); }
  .result-item.fail { border-left: 2px solid var(--danger); }
  .debug-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; margin: 4px 8px; display: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div class="header-info">
    <h2>Send RFQ to Vendors</h2>
    <p id="rfqName">Loading RFQ...</p>
  </div>
  <div class="rfq-badge" id="rfqBadge">—</div>
</div>

<div class="section">
  <div class="section-header">📦 RFQ Line Items <span id="lineItemCount">0</span></div>
  <div class="products-list" id="productsList">
    <div class="state-msg"><div class="spinner"></div>Loading items...</div>
  </div>
</div>

<div class="section">
  <div class="section-header">🏭 Select Vendors <span id="vendorCount">0</span></div>
  <div class="search-wrap">
    <input class="search-input" id="vendorSearch" type="text" placeholder="Search vendors..." oninput="filterVendors()"/>
  </div>
  <div class="select-all-row">
    <button class="select-all-btn" onclick="toggleSelectAll()">Select All</button>
    <span class="selected-count" id="selectedCount">0 selected</span>
  </div>
  <div class="vendors-list" id="vendorsList">
    <div class="state-msg"><div class="spinner"></div>Loading vendors...</div>
  </div>
</div>

<div class="footer">
  <button class="btn btn-secondary" onclick="ZOHO.CRM.UI.Popup.close()">Cancel</button>
  <button class="btn btn-primary" id="sendBtn" onclick="sendRFQ()" disabled>✉️ Send to Vendors</button>
</div>

<div class="progress-overlay" id="progressOverlay">
  <div class="spinner"></div>
  <div class="progress-title" id="progressTitle">Creating RFQ records...</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-steps" id="progressSteps"></div>
  <div class="result-box" id="resultBox">
    <div class="result-icon" id="resultIcon">✅</div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-sub" id="resultSub"></div>
    <div class="result-list" id="resultList"></div>
    <button class="btn btn-primary" style="max-width:200px;margin-top:8px" onclick="closeWidget()">Done</button>
  </div>
</div>

<script>
var rfqId = null;
var rfqName = '';
var lineItems = []; // [{productId, productName}]
var allVendors = [];
var filteredVendors = [];
var selectedVendors = new Set();

ZOHO.embeddedApp.on("PageLoad", function(data) {
  console.log("PageLoad:", JSON.stringify(data));
  rfqId = data.EntityId;
  if (Array.isArray(rfqId)) rfqId = rfqId[0];
  rfqId = String(rfqId);
  document.getElementById('rfqBadge').textContent = rfqId.slice(-6);
  loadAll();
});
ZOHO.embeddedApp.init();

async function loadAll() {
  await Promise.all([loadRFQAndLineItems(), loadVendors()]);
}

// ── Load RFQ name + line items via COQL ──────────────────
async function loadRFQAndLineItems() {
  try {
    // Get RFQ name
    var rfqRes = await ZOHO.CRM.API.getRecord({ Entity: "RFQs", RecordID: rfqId });
    if (rfqRes && rfqRes.data && rfqRes.data[0]) {
      rfqName = rfqRes.data[0].Name || ('RFQ-' + rfqId.slice(-6));
      document.getElementById('rfqName').textContent = rfqName;
    }
  } catch(e) {
    console.warn('Could not load RFQ name:', e);
    rfqName = 'RFQ-' + rfqId.slice(-6);
    document.getElementById('rfqName').textContent = rfqName;
  }

  try {
    // Use COQL to get RFQ_List records linked to this RFQ
    // RFQ_List has: RFQ_List (lookup→RFQs) and Line_Items (lookup→Products)
    var query = "SELECT id, Line_Items, RFQ_List FROM RFQ_List WHERE RFQ_List = '" + rfqId + "' LIMIT 200";
    console.log("COQL query:", query);

    var res = await ZOHO.CRM.API.coqlQuery({ select_query: query });
    console.log("COQL result:", JSON.stringify(res));

    var data = (res && res.data) ? res.data : [];
    lineItems = data.map(function(row) {
      var product = row.Line_Items || {};
      return {
        id: row.id,
        productId: product.id || '',
        productName: product.name || product.Name || 'Unknown Product'
      };
    });

    renderProducts();
    document.getElementById('lineItemCount').textContent = lineItems.length;

    if (lineItems.length === 0) {
      document.getElementById('productsList').innerHTML =
        '<div class="state-msg">⚠️ No line items found on this RFQ.<br/>Please add products to the RFQ List first.</div>';
    }
  } catch(e) {
    console.error('Line items error:', e);
    document.getElementById('productsList').innerHTML =
      '<div class="state-msg">⚠️ ' + (e.message || 'Error loading line items') + '</div>';
  }
}

function renderProducts() {
  var el = document.getElementById('productsList');
  if (!lineItems.length) return;
  el.innerHTML = lineItems.map(function(item) {
    return '<div class="product-chip">' +
      '<div class="product-dot"></div>' +
      '<span class="product-name">' + escHtml(item.productName) + '</span>' +
      '<span class="product-id">' + (item.productId ? item.productId.toString().slice(-6) : '—') + '</span>' +
    '</div>';
  }).join('');
}

// ── Load Vendors via COQL ─────────────────────────────────
async function loadVendors() {
  try {
    var query = "SELECT id, Vendor_Name, Email FROM Vendors LIMIT 200";
    var res = await ZOHO.CRM.API.coqlQuery({ select_query: query });
    console.log("Vendors result:", JSON.stringify(res));

    allVendors = (res && res.data) ? res.data : [];
    filteredVendors = allVendors.slice();
    document.getElementById('vendorCount').textContent = allVendors.length;
    renderVendors();

    if (allVendors.length === 0) {
      document.getElementById('vendorsList').innerHTML =
        '<div class="state-msg">⚠️ No vendors found in CRM</div>';
    }
  } catch(e) {
    console.error('Vendors error:', e);
    document.getElementById('vendorsList').innerHTML =
      '<div class="state-msg">⚠️ ' + (e.message || 'Error loading vendors') + '</div>';
  }
}

function renderVendors() {
  var el = document.getElementById('vendorsList');
  if (!filteredVendors.length) {
    el.innerHTML = '<div class="state-msg">No vendors found</div>';
    return;
  }
  el.innerHTML = filteredVendors.map(function(v) {
    var name = v.Vendor_Name || v.Name || 'Vendor';
    var email = v.Email || '';
    var initials = name.substring(0, 2).toUpperCase();
    var sel = selectedVendors.has(v.id) ? 'selected' : '';
    return '<div class="vendor-item ' + sel + '" onclick="toggleVendor(\'' + v.id + '\')">' +
      '<div class="vendor-checkbox">' + (selectedVendors.has(v.id) ? '✓' : '') + '</div>' +
      '<div class="vendor-avatar">' + initials + '</div>' +
      '<div class="vendor-info">' +
        '<div class="vendor-name">' + escHtml(name) + '</div>' +
        '<div class="vendor-email">' + escHtml(email || '—') + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function filterVendors() {
  var q = document.getElementById('vendorSearch').value.toLowerCase();
  filteredVendors = allVendors.filter(function(v) {
    return (v.Vendor_Name || '').toLowerCase().includes(q) ||
           (v.Email || '').toLowerCase().includes(q);
  });
  renderVendors();
}

function toggleVendor(id) {
  if (selectedVendors.has(id)) selectedVendors.delete(id);
  else selectedVendors.add(id);
  updateSelectedCount();
  renderVendors();
}

function toggleSelectAll() {
  if (selectedVendors.size === filteredVendors.length && filteredVendors.length > 0) {
    filteredVendors.forEach(function(v) { selectedVendors.delete(v.id); });
  } else {
    filteredVendors.forEach(function(v) { selectedVendors.add(v.id); });
  }
  updateSelectedCount();
  renderVendors();
}

function updateSelectedCount() {
  var n = selectedVendors.size;
  document.getElementById('selectedCount').textContent = n + ' selected';
  document.getElementById('sendBtn').disabled = (n === 0 || lineItems.length === 0);
}

// ── Send RFQ ──────────────────────────────────────────────
async function sendRFQ() {
  var vendors = allVendors.filter(function(v) { return selectedVendors.has(v.id); });
  if (!vendors.length) return;

  var overlay = document.getElementById('progressOverlay');
  var stepsEl = document.getElementById('progressSteps');
  var bar = document.getElementById('progressBar');
  var titleEl = document.getElementById('progressTitle');
  overlay.classList.add('show');

  stepsEl.innerHTML = vendors.map(function(v) {
    var name = v.Vendor_Name || v.Name || 'Vendor';
    return '<div class="progress-step" id="vstep_' + v.id + '">' +
      '<span>⏳</span><span>' + escHtml(name) + '</span></div>';
  }).join('');

  var results = [];
  var total = vendors.length;

  for (var i = 0; i < vendors.length; i++) {
    var vendor = vendors[i];
    var vName = vendor.Vendor_Name || vendor.Name || 'Vendor';
    var stepEl = document.getElementById('vstep_' + vendor.id);

    if (stepEl) { stepEl.className = 'progress-step active'; stepEl.querySelector('span').textContent = '🔄'; }
    titleEl.textContent = 'Creating ' + (i+1) + ' of ' + total + ': ' + vName;
    bar.style.width = Math.round((i / total) * 100) + '%';

    try {
      // Create Requested_For_Quotations record with subform Requested_Items
      var subformItems = lineItems.map(function(item) {
        return { Item: { id: item.productId } };
      });

      var recordData = {
        Name: rfqName + ' - ' + vName,
        Vendor: { id: vendor.id },
        Related_RFQ: { id: rfqId },
        Requested_Items: subformItems
      };

      console.log("Creating RFQ record:", JSON.stringify(recordData));

      var createRes = await ZOHO.CRM.API.insertRecord({
        Entity: "Requested_For_Quotations",
        APIData: recordData,
        Trigger: []
      });

      console.log("Create result:", JSON.stringify(createRes));

      var newId = null;
      if (createRes && createRes.data && createRes.data[0]) {
        newId = createRes.data[0].details && createRes.data[0].details.id;
        if (!newId && createRes.data[0].status === 'success') {
          newId = createRes.data[0].details && createRes.data[0].details.id;
        }
      }

      if (createRes && createRes.data && createRes.data[0] && createRes.data[0].code === 'SUCCESS') {
        results.push({ vendor: vName, ok: true });
        if (stepEl) { stepEl.className = 'progress-step done'; stepEl.querySelector('span').textContent = '✅'; }
      } else {
        throw new Error(JSON.stringify(createRes));
      }

    } catch(err) {
      console.error('Error for', vName, err);
      results.push({ vendor: vName, ok: false, error: String(err.message || err) });
      if (stepEl) { stepEl.className = 'progress-step error'; stepEl.querySelector('span').textContent = '❌'; }
    }
  }

  bar.style.width = '100%';

  var ok = results.filter(function(r) { return r.ok; }).length;
  var fail = results.filter(function(r) { return !r.ok; }).length;

  var resultBox = document.getElementById('resultBox');
  document.getElementById('resultIcon').textContent = fail === 0 ? '🎉' : (ok > 0 ? '⚠️' : '❌');
  document.getElementById('resultTitle').textContent = fail === 0
    ? 'All RFQs Sent Successfully!'
    : ok + ' Created, ' + fail + ' Failed';
  document.getElementById('resultSub').textContent =
    ok + ' Requested For Quotation record(s) created with items auto-populated.';
  document.getElementById('resultList').innerHTML = results.map(function(r) {
    return '<div class="result-item ' + (r.ok ? 'ok' : 'fail') + '">' +
      (r.ok ? '✅' : '❌') + ' ' + escHtml(r.vendor) +
      (r.ok ? '' : ' — ' + escHtml((r.error || '').substring(0, 60))) +
    '</div>';
  }).join('');

  titleEl.style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';
  document.querySelector('.spinner').style.display = 'none';
  resultBox.classList.add('show');

  if (ok > 0) {
    setTimeout(function() { try { ZOHO.CRM.UI.Record.reload(); } catch(e) {} }, 1500);
  }
}

function closeWidget() {
  try { ZOHO.CRM.UI.Popup.close(); } catch(e) {}
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
