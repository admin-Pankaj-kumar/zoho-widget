<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RFQ Price Comparison</title>
<script src="https://live.zwidgets.com/js-sdk/1.1/ZohoEmbededAppSDK.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow-x:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;font-size:13px;color:#1a202c;padding:14px;display:flex;flex-direction:column;gap:10px}
  .header{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .hicon{width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#06b6d4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .htitle{font-size:14px;font-weight:700}
  .hsub{font-size:11px;color:#718096;margin-top:1px}
  .hbadge{margin-left:auto;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .scard{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:10px 14px}
  .slabel{font-size:10px;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .sval{font-size:18px;font-weight:700}
  .sval.green{color:#059669}
  .sval.blue{color:#2563eb}
  .table-wrap{background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;flex:1}
  .thead-row{padding:9px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
  .ttitle{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px}
  .legend{display:flex;gap:10px}
  .leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#718096}
  .ldot{width:7px;height:7px;border-radius:50%}
  .tscroll{overflow-x:auto;width:100%}
  table{width:100%;border-collapse:collapse;table-layout:auto}
  thead th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e2e8f0;background:#f8fafc;white-space:nowrap}
  th.r{text-align:right}
  tbody td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#fafbff}
  td.r{text-align:right}
  .iname{font-weight:600;font-size:12px}
  .exp{font-size:11px;color:#6b7280;font-family:monospace}
  .vp{font-size:12px;font-weight:600;font-family:monospace;color:#374151;white-space:nowrap}
  .vp.best{color:#059669;font-weight:700}
  .vp.none{color:#9ca3af;font-size:11px;font-weight:400}
  .bestbadge{background:#059669;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:6px;margin-left:3px;vertical-align:middle}
  .saving{font-size:11px;font-weight:600;white-space:nowrap}
  .saving.pos{color:#059669}
  .saving.neg{color:#dc2626}
  .saving.zero{color:#9ca3af}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:#9ca3af;font-size:13px;text-align:center}
  .spinner{width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="hicon">📊</div>
  <div>
    <div class="htitle">RFQ Price Comparison</div>
    <div class="hsub" id="hsub">Loading...</div>
  </div>
  <div class="hbadge" id="hbadge">—</div>
</div>

<div class="summary" id="summary" style="display:none">
  <div class="scard"><div class="slabel">Total Items</div><div class="sval blue" id="sItems">0</div></div>
  <div class="scard"><div class="slabel">Vendors Quoted</div><div class="sval blue" id="sVendors">0</div></div>
  <div class="scard"><div class="slabel">Potential Savings</div><div class="sval green" id="sSavings">—</div></div>
</div>

<div class="table-wrap">
  <div class="thead-row">
    <div class="ttitle">📦 Price Comparison by Item</div>
    <div class="legend">
      <div class="leg"><div class="ldot" style="background:#059669"></div>Best Price</div>
      <div class="leg"><div class="ldot" style="background:#9ca3af"></div>No Quote</div>
    </div>
  </div>
  <div id="tableContent">
    <div class="center"><div class="spinner"></div>Loading data...</div>
  </div>
</div>

<script>
var rfqId = null;

ZOHO.embeddedApp.on("PageLoad", function(data) {
  rfqId = String(Array.isArray(data.EntityId) ? data.EntityId[0] : data.EntityId);

  // Expand popup to max width
  try { ZOHO.CRM.UI.Popup.resize({ width: "1200px", height: "800px" }); } catch(e) {}

  load();
});
ZOHO.embeddedApp.init();

async function load() {
  try {
    // 1. Get RFQ name
    var rfqRes = await ZOHO.CRM.API.getRecord({ Entity: "RFQs", RecordID: rfqId });
    var rfqName = (rfqRes && rfqRes.data && rfqRes.data[0] && rfqRes.data[0].Name) || rfqId;
    document.getElementById('hsub').textContent = rfqName;
    document.getElementById('hbadge').textContent = rfqId.slice(-6);

    // 2. Get all Requested_For_Quotations for this RFQ
    var rfqsRes = await ZOHO.CRM.API.searchRecord({
      Entity: "Requested_For_Quotations",
      Type: "criteria",
      Query: "(Related_RFQ:equals:" + rfqId + ")"
    });
    var rfqs = (rfqsRes && rfqsRes.data) ? rfqsRes.data : [];

    if (!rfqs.length) {
      document.getElementById('tableContent').innerHTML =
        '<div class="center">📭<br/>No vendor quotations found.<br/>Please send RFQ to vendors first.</div>';
      return;
    }

    // 3. For each RFQ, use getRecord to get full record including Requested_Items subform
    var itemsMap = {};
    var vendorNames = [];

    for (var i = 0; i < rfqs.length; i++) {
      var rfqRec = rfqs[i];
      var vName = (rfqRec.Vendor && rfqRec.Vendor.name) || rfqRec.Name || 'Vendor';
      if (vendorNames.indexOf(vName) === -1) vendorNames.push(vName);

      try {
        var fullRec = await ZOHO.CRM.API.getRecord({
          Entity: "Requested_For_Quotations",
          RecordID: rfqRec.id
        });
        var rec = fullRec && fullRec.data && fullRec.data[0];
        if (!rec) continue;

        var items = rec.Requested_Items || [];
        items.forEach(function(item) {
          var p = item.Item || {};
          if (!p.id) return;
          if (!itemsMap[p.id]) {
            itemsMap[p.id] = { name: p.name || 'Product', expectedPrice: item.Expected_Price || 0, vendors: {} };
          }
          itemsMap[p.id].vendors[vName] = item.Received_Price;
        });
      } catch(e) {
        console.warn("Error for", vName, e);
      }
    }

    render(itemsMap, vendorNames);

  } catch(e) {
    console.error("load error:", e);
    document.getElementById('tableContent').innerHTML =
      '<div class="center">⚠️<br/>' + esc(String(e.message || e)) + '</div>';
  }
}

function render(itemsMap, vendorNames) {
  var items = Object.values(itemsMap);
  if (!items.length) {
    document.getElementById('tableContent').innerHTML =
      '<div class="center">📭<br/>No items found.<br/>Ensure vendors have entered prices in Requested Items.</div>';
    return;
  }

  // Summary
  var totalSavings = 0;
  var vendorsWithQuotes = [];
  items.forEach(function(item) {
    var prices = [];
    vendorNames.forEach(function(vn) {
      var p = item.vendors[vn];
      if (p != null && p > 0) { prices.push(p); if (vendorsWithQuotes.indexOf(vn) === -1) vendorsWithQuotes.push(vn); }
    });
    if (prices.length && item.expectedPrice > 0) totalSavings += (item.expectedPrice - Math.min.apply(null, prices));
  });

  document.getElementById('summary').style.display = 'grid';
  document.getElementById('sItems').textContent = items.length;
  document.getElementById('sVendors').textContent = vendorsWithQuotes.length + ' / ' + vendorNames.length;
  document.getElementById('sSavings').innerHTML = (totalSavings >= 0 ? '&#8377;' : '-&#8377;') + fmt(Math.abs(totalSavings));
  document.getElementById('sSavings').className = 'sval ' + (totalSavings > 0 ? 'green' : 'blue');

  var ths = '<th>Item</th><th class="r">Expected</th>' +
    vendorNames.map(function(vn) { return '<th class="r" style="min-width:110px">' + esc(vn) + '</th>'; }).join('') +
    '<th class="r" style="min-width:100px">Best Price</th><th class="r" style="min-width:80px">Savings</th>';

  var rows = items.map(function(item) {
    var prices = vendorNames.map(function(vn) { return { vn: vn, p: item.vendors[vn] }; })
      .filter(function(x) { return x.p != null && x.p > 0; });
    var bestPrice = prices.length ? Math.min.apply(null, prices.map(function(x) { return x.p; })) : null;
    var savings = (bestPrice != null && item.expectedPrice > 0) ? item.expectedPrice - bestPrice : null;

    var vendorCols = vendorNames.map(function(vn) {
      var p = item.vendors[vn];
      var isBest = (p != null && p > 0 && p === bestPrice);
      if (p != null && p > 0) {
        return '<td class="r"><span class="vp' + (isBest ? ' best' : '') + '">&#8377;' + fmt(p) + '</span>' +
          (isBest ? '<span class="bestbadge">BEST</span>' : '') + '</td>';
      }
      return '<td class="r"><span class="vp none">No quote</span></td>';
    }).join('');

    var savHtml = savings == null ? '<span class="saving zero">&mdash;</span>'
      : savings > 0 ? '<span class="saving pos">&#8595; &#8377;' + fmt(savings) + '</span>'
      : savings < 0 ? '<span class="saving neg">&#8593; &#8377;' + fmt(Math.abs(savings)) + '</span>'
      : '<span class="saving zero">&#8377;0</span>';

    return '<tr>' +
      '<td><div class="iname">' + esc(item.name) + '</div></td>' +
      '<td class="r"><span class="exp">' + (item.expectedPrice ? '&#8377;' + fmt(item.expectedPrice) : '&mdash;') + '</span></td>' +
      vendorCols +
      '<td class="r"><span class="vp best">' + (bestPrice ? '&#8377;' + fmt(bestPrice) : '&mdash;') + '</span></td>' +
      '<td class="r">' + savHtml + '</td>' +
    '</tr>';
  }).join('');

  document.getElementById('tableContent').innerHTML =
    '<div class="tscroll"><table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function fmt(n) { return Number(n || 0).toLocaleString('en-IN'); }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
</script>
</body>
</html>
